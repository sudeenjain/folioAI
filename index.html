<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>FolioAI - Professional Portfolio Builder</title>
    <meta name="title" content="FolioAI - Free & Easy Professional Portfolio Builder" />
    <meta name="description" content="Create your professional portfolio easily with FolioAI. A free, ready-to-use, and easy portfolio builder for professionals and creatives to showcase their work." />
    <meta name="keywords" content="free portfolio, ready portfolio, easy portfolio, portfolio builder, create portfolio, online portfolio, professional portfolio, developer portfolio, designer portfolio, FolioAI" />
    <meta name="author" content="FolioAI" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FolioAI - Free & Easy Professional Portfolio Builder" />
    <meta property="og:description" content="Create your professional portfolio easily with FolioAI. A free, ready-to-use, and easy portfolio builder for professionals and creatives to showcase their work." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="FolioAI - Free & Easy Professional Portfolio Builder" />
    <meta property="twitter:description" content="Create your professional portfolio easily with FolioAI. A free, ready-to-use, and easy portfolio builder for professionals and creatives to showcase their work." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%236366f1'/><stop offset='100%' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='72' font-family='system-ui, sans-serif' font-weight='900' font-size='65' fill='white' text-anchor='middle'>P</text></svg>">
    <style>
      :root {
        --loader-bg: #fcfcfc;
        --loader-text: #050505;
        --loader-accent: #6366f1; /* Indigo-500 */
      }

      html.dark {
        --loader-bg: #050505;
        --loader-text: #ededed;
        --loader-accent: #8b5cf6; /* Violet-500 */
      }

      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--loader-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      #initial-loader.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0, 0, 0, 0.05);
        border-top-color: var(--loader-accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      html.dark .spinner {
        border-color: rgba(255, 255, 255, 0.05);
        border-top-color: var(--loader-accent);
      }

      .loader-text {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--loader-text);
        letter-spacing: 0.025em;
        min-height: 1.25rem;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .typing::after {
        content: '|';
        animation: blink 1s step-end infinite;
        margin-left: 2px;
        color: var(--loader-accent);
      }

      @keyframes blink {
        from, to { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
    <script>
      // Check for dark mode before render
      if (localStorage.getItem('portfolio-theme') === 'dark' || 
          (!localStorage.getItem('portfolio-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-content">
        <div class="spinner"></div>
        <div id="loader-status" class="loader-text typing"></div>
      </div>
    </div>
    <script>
      const statusElement = document.getElementById('loader-status');
      const messages = [
        "Loading Portfolio...",
        "Preparing Experience...",
        "Rendering Projects...",
        "Finalizing FolioAI..."
      ];
      let currentMsgIndex = 0;
      let charIndex = 0;
      let isDeleting = false;
      let typeSpeed = 100;

      function type() {
        const currentMsg = messages[currentMsgIndex];
        
        if (isDeleting) {
          statusElement.textContent = currentMsg.substring(0, charIndex - 1);
          charIndex--;
          typeSpeed = 50;
        } else {
          statusElement.textContent = currentMsg.substring(0, charIndex + 1);
          charIndex++;
          typeSpeed = 100;
        }

        if (!isDeleting && charIndex === currentMsg.length) {
          isDeleting = true;
          typeSpeed = 2000; // Pause at end
        } else if (isDeleting && charIndex === 0) {
          isDeleting = false;
          currentMsgIndex = (currentMsgIndex + 1) % messages.length;
          typeSpeed = 500;
        }

        setTimeout(type, typeSpeed);
      }

      // Start typing animation
      type();

      // Remove loader when page is fully loaded
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        // Small delay to ensure smooth transition
        setTimeout(() => {
          loader.classList.add('fade-out');
          // Remove from DOM after transition
          setTimeout(() => {
            loader.remove();
          }, 600);
        }, 800);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
